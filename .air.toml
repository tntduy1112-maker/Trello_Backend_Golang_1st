# ============================================
# Air — Live Reload for Go Development
# ============================================
# Install: go install github.com/air-verse/air@latest
# Run: air -c .air.toml
# ============================================

root = "."
tmp_dir = "tmp"

[build]
# Command to build the binary
cmd = "go build -o ./tmp/server ./cmd/server"
# Binary to run
bin = "./tmp/server"
# Watch these extensions
include_ext = ["go", "tpl", "tmpl", "html", "sql"]
# Exclude directories
exclude_dir = ["assets", "tmp", "vendor", "testdata", "node_modules", ".git", "Frontend"]
# Exclude files
exclude_file = []
# Exclude regex
exclude_regex = ["_test.go"]
# Exclude unchanged files
exclude_unchanged = false
# Follow symlinks
follow_symlink = false
# Log file
log = "build-errors.log"
# Poll interval for watching
poll = false
poll_interval = 0
# Delay before rebuild (ms)
delay = 1000
# Stop running old binary before building
stop_on_error = true
# Send Interrupt signal before kill
send_interrupt = false
# Kill delay (ms)
kill_delay = 500
# Rerun binary with arguments
args_bin = []

[log]
# Show time in log
time = false
# Only show main log (no watcher info)
main_only = false

[color]
# Colors for output
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
# Delete tmp directory on exit
clean_on_exit = true

[screen]
# Clear screen on rebuild
clear_on_rebuild = true
# Keep scroll position
keep_scroll = true
