# ============================================
# Trello Agent — Docker Compose (Development)
# ============================================
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f api    # View API logs
#   docker compose down -v        # Stop and remove volumes
# ============================================

services:
  # ==========================================
  # PostgreSQL 16
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: trello-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-trello_agent}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trello_agent_secret}
      POSTGRES_DB: ${DB_NAME:-trello_agent}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trello_agent} -d ${DB_NAME:-trello_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trello-agent-network

  # ==========================================
  # Redis 7
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: trello-agent-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trello-agent-network

  # ==========================================
  # MinIO (S3-compatible storage)
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: trello-agent-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_PORT:-9000}:9000"      # API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - trello-agent-network

  # ==========================================
  # MinIO Client (create buckets on startup)
  # ==========================================
  minio-setup:
    image: minio/mc:latest
    container_name: trello-agent-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb myminio/${MINIO_BUCKET:-trello-agent} --ignore-existing;
      mc anonymous set download myminio/${MINIO_BUCKET:-trello-agent}/avatars;
      mc anonymous set download myminio/${MINIO_BUCKET:-trello-agent}/attachments;
      echo 'MinIO buckets created successfully';
      exit 0;
      "
    networks:
      - trello-agent-network

  # ==========================================
  # Go API Server
  # ==========================================
  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: trello-agent-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # App
      APP_NAME: trello-agent
      APP_ENV: development
      APP_PORT: 8080
      APP_URL: http://localhost:8080
      LOG_LEVEL: debug

      # Database
      DATABASE_URL: postgres://${DB_USER:-trello_agent}:${DB_PASSWORD:-trello_agent_secret}@postgres:5432/${DB_NAME:-trello_agent}?sslmode=disable
      DB_POOL_MAX: 10

      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0

      # JWT
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-your-super-secret-access-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-super-secret-refresh-key-change-in-production}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 168h

      # AES Encryption (for cookies)
      AES_KEY: ${AES_KEY:-32-byte-secret-key-for-aes256!}

      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-trello-agent}
      MINIO_USE_SSL: "false"

      # SMTP (development - use MailHog or similar)
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@trello-agent.local}

      # Frontend URL (for email links)
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    ports:
      - "${API_PORT:-8080}:8080"
    # volumes:
      # Hot reload in development - disabled for containerized builds
      # - .:/app:ro
    networks:
      - trello-agent-network

  # ==========================================
  # MailHog (Development email testing)
  # ==========================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: trello-agent-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"   # SMTP
      - "${MAILHOG_UI_PORT:-8025}:8025"     # Web UI
    networks:
      - trello-agent-network

# ==========================================
# Networks
# ==========================================
networks:
  trello-agent-network:
    driver: bridge

# ==========================================
# Volumes
# ==========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
